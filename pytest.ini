# pytest.ini — Test Configuration for Delivery Chatbot

[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output format
addopts =
    -v
    --tb=short
    --no-header

# Custom markers
markers =
    live: Real Gemini API tests — require GOOGLE_API_KEY and incur API costs.
          Run with: pytest -m live

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:langchain.*
